name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Type-check & build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Version comes from packageManager in package.json, so local and
        # CI use the same pnpm version.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check + build
        run: pnpm build

      - name: Unit tests
        # The vitest suite freezes security-critical pure logic (approval
        # classification mirrors, autonomy budget/breaker, trigger router,
        # report parsing, path pills). It must gate CI, not just build.
        run: pnpm test

  rust:
    name: Rust tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Runtime sandbox tests exercise the same pinned Node/pnpm toolchain
        # that shipped builds expose to Mission quality gates.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
