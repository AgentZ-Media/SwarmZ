name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*.*'

permissions:
  contents: read

jobs:
  # ============================================================
  # 1) Fail-closed source, version and release-notes preflight
  # ============================================================
  # A release is valid only when the pushed stable tag still points at the
  # freshly fetched origin/main, every product manifest matches the tag and
  # a non-placeholder per-version notes file exists. No build/signing secret
  # is exposed before this job succeeds.
  preflight:
    name: Verify release source and metadata
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      source_sha: ${{ steps.source.outputs.source_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is current origin/main
        id: source
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::Release workflow must run from a tag, got ${GITHUB_REF_TYPE}."
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tag must be a stable vMAJOR.MINOR.PATCH tag without leading zeroes."
            exit 1
          fi
          git fetch --force --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          tag_sha="$(git rev-parse --verify 'HEAD^{commit}')"
          main_sha="$(git rev-parse --verify 'refs/remotes/origin/main^{commit}')"
          if [[ "${tag_sha}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Checked-out tag commit ${tag_sha} differs from event SHA ${GITHUB_SHA}."
            exit 1
          fi
          if [[ "${tag_sha}" != "${main_sha}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${tag_sha}) is not current origin/main (${main_sha})."
            exit 1
          fi
          echo "source_sha=${tag_sha}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test release preflight
        run: node --test .github/scripts/release-preflight.test.mjs

      - name: Verify manifest versions and release notes
        run: node .github/scripts/release-preflight.mjs "${GITHUB_REF_NAME}"

      - name: Build release body
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="docs/release-notes/${GITHUB_REF_NAME}.md"
          FOOTER_FILE="docs/release-notes/_install_footer.md"
          delimiter="SWARMZ_RELEASE_BODY_$(openssl rand -hex 16)"
          if grep -Fqx "$delimiter" "$NOTES_FILE" "$FOOTER_FILE"; then
            echo "::error::Generated release-body delimiter unexpectedly collides with source content."
            exit 1
          fi
          {
            echo "body<<${delimiter}"
            cat "$NOTES_FILE"
            echo
            cat "$FOOTER_FILE"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

  # ============================================================
  # 2) macOS build (Apple Silicon)
  # ============================================================
  # Creates the GitHub release including `latest.json` for the
  # in-app auto-updater. The app is ad-hoc signed only (no Apple
  # Developer ID / notarization) - see the install footer for the
  # Gatekeeper workaround users need on first launch.
  build-macos:
    name: Build macOS (Apple Silicon)
    needs: preflight
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}

      - name: Verify pinned release source
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse --verify 'HEAD^{commit}')"
          expected="${{ needs.preflight.outputs.source_sha }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::Build checkout ${actual} differs from verified release source ${expected}."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos

      - name: Setup pnpm
        # Version comes from packageManager in package.json, so local and
        # CI use the same pnpm version.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing key. Required so tauri-action emits the
          # signed `latest.json` manifest + `.app.tar.gz` bundle that the
          # in-app updater polls for. Repo secret:
          #   - TAURI_SIGNING_PRIVATE_KEY: contents of ~/.tauri/swarmz_updater.key
          #     (generated with an empty password, so no password secret needed)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SwarmZ ${{ github.ref_name }}'
          releaseBody: ${{ needs.preflight.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
