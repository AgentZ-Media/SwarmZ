    - "!src/components/CloseWorkspaceDialog.tsx"
    - "!src/components/Dictation.tsx"
    - "!src/components/FileDropOverlay.tsx"
    - "!src/components/FloatingTerminals.tsx"
    - "!src/components/InsertCommandPalette.tsx"
