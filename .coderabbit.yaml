# CodeRabbit-Konfiguration
# Der rebuild/codex-only-v1-PR löscht das gesamte alte Terminal-/PTY-/OpenRouter-
# Subsystem (47 Dateien). Reine Löschungen brauchen keine Review, zählen aber
# gegen das 150-Dateien-Limit pro PR — daher sind die entfernten Legacy-Pfade
# hier explizit ausgeschlossen.
reviews:
  path_filters:
    - "!src-tauri/Info.plist"
    - "!src-tauri/src/limits.rs"
    - "!src-tauri/src/localstt.rs"
    - "!src-tauri/src/openrouter.rs"
    - "!src-tauri/src/orchestrator/openrouter.rs"
    - "!src-tauri/src/project.rs"
    - "!src-tauri/src/pty.rs"
    - "!src-tauri/src/usage.rs"
    - "!src/components/AgentPane.tsx"
